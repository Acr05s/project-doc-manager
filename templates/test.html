<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试登录按钮</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            background: linear-gradient(135deg, #007bff 0%, #004d99 100%);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .auth-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .login-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: transparent;
            border: 1px solid white;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>📁 项目文档管理中心</h1>
            <div class="auth-container">
                <button class="login-btn">登录</button>
            </div>
        </div>
    </div>
</body>
</html>
